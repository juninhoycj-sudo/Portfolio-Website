<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>jooniee's website</title>
    <style>
        :root {
            --bg: navy;
            --text: #e8eaf0;
            --muted: #7a7f8e;
            --accent: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
        }

        nav {
            position: sticky;
            top: 0; left: 0; right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: #0d0f12;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        nav a:hover { color: var(--text); }

        .finished-link {
            font-size: 12px;
            border: 1px solid var(--muted);
            padding: 5px 12px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }

        .finished-link:hover {
            color: var(--accent) !important;
            border-color: var(--accent);
        }

        main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        h1 {
            border: 1px solid red;
            padding: 20px;
            margin: 40px;
            font-size: 7cqh;
            font-weight: 900;
        }

        p {
            color: var(--text);
            font-size: 1.2rem;
        }

        a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover { color: pink; }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #4ade80;
            animation: blink 0.75s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <nav>
        <span style="color: var(--text); font-size: 14px;">my version (wip)</span>
        <a class="finished-link" href="aspirational.html">view finished site →</a>
    </nav>

    <main>
        <h1 id="heading">hello. i'm juninho<span class="cursor"></span></h1>
        <p>i'm <span id="role"></span>, clearly.</p>
    </main>

    <script>
        const heading = document.getElementById('heading');

        heading.addEventListener('click', function(){
            heading.style.color = "blue";
             });

        const e1 = document.getElementById('role');
        const words = ["a developer", "a builder", "in love", "gay"];
        let wordIndex = 0, charIndex = 0, deleting = false;

        function typeRole() {
            const word = words[wordIndex];
            if (!deleting) {
                e1.textContent = word.slice(0, charIndex++);
                if (charIndex > word.length) {
                    deleting = true;
                    setTimeout(typeRole, 100);
                    return;
                }
            }
            else {
                e1.textContent = word.slice(0, charIndex--);
                if (charIndex < 0) {
                    deleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    charIndex = 0;
                    setTimeout(typeRole, 100);
                    return;
                }
            }

            setTimeout(typeRole, deleting ? 40 : 80)
        }
        typeRole();
    </script>
</body>
</html>
