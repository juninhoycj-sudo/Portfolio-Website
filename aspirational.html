<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juninho</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  #intro-bg {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    transition: opacity 0.65s ease;
    pointer-events: none;
  }

  #intro {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .intro-line {
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    font-size: clamp(1.4rem, 4vw, 2.5rem);
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.5em;
  }

  .intro-prompt {
    color: var(--muted);
    user-select: none;
    transition: opacity 0.18s ease;
  }

  #typed { display: inline-block; }

  .intro-cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--accent);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 0.75s step-end infinite;
    transition: opacity 0.18s ease;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .intro-skip {
    position: fixed;
    bottom: 2rem; right: 2rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--border2);
    letter-spacing: 0.08em;
    cursor: pointer;
    border: none;
    background: none;
    transition: color 0.2s;
    z-index: 1001;
  }
  .intro-skip:hover { color: var(--muted); }

  .home-hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.1rem;
    text-align: center;
    padding: 0 2rem;
  }

  .home-hero h1 {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--text);
    opacity: 0;
  }

  .hero-role {
    font-family: var(--mono);
    font-size: clamp(0.95rem, 2.5vw, 1.4rem);
    color: var(--muted);
    opacity: 0;
    transform: translateY(10px);
    display: flex;
    align-items: center;
  }

  .role-text { color: var(--accent2); }

  .role-cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--accent2);
    vertical-align: middle;
    margin-left: 3px;
    animation: blink 0.75s step-end infinite;
  }
</style>
</head>
<body>

<div id="intro-bg"></div>
<div id="intro">
  <div class="intro-line">
    <span class="intro-prompt">~/</span>
    <span id="typed"></span><span class="intro-cursor" id="cursor"></span>
  </div>
</div>
<button class="intro-skip" id="skip-btn">skip →</button>

<nav>
  <a class="nav-logo" href="aspirational.html">jooniee.dev</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="index.html" class="active">return to reality.</a></li>
  </ul>
</nav>

<main class="home-hero">
  <h1 id="hero-name">hello, i'm juninho</h1>
  <div class="hero-role" id="hero-role">
    i'm a&nbsp;<span class="role-text" id="role"></span><span class="role-cursor"></span>
  </div>
</main>

<script>
(function () {
  const phrase   = "hello, i'm juninho";
  const typed    = document.getElementById('typed');
  const cursor   = document.getElementById('cursor');
  const prompt   = document.querySelector('.intro-prompt');
  const introBg  = document.getElementById('intro-bg');
  const intro    = document.getElementById('intro');
  const skipBtn  = document.getElementById('skip-btn');
  const heroName = document.getElementById('hero-name');
  const heroRole = document.getElementById('hero-role');
  const roleEl   = document.getElementById('role');

  const roles = [
    "software engineer",
    "full stack developer",
    "problem solver",
    "builder of things",
  ];

  let rIdx = 0, cIdx = 0, deleting = false;

  function typeRole() {
    const word = roles[rIdx];
    if (!deleting) {
      roleEl.textContent = word.slice(0, ++cIdx);
      if (cIdx === word.length) {
        deleting = true;
        setTimeout(typeRole, 1800);
        return;
      }
    } else {
      roleEl.textContent = word.slice(0, --cIdx);
      if (cIdx === 0) {
        deleting = false;
        rIdx = (rIdx + 1) % roles.length;
        setTimeout(typeRole, 380);
        return;
      }
    }
    setTimeout(typeRole, deleting ? 40 : 70 + Math.random() * 30);
  }

  function revealRole() {
    heroRole.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    heroRole.style.opacity    = '1';
    heroRole.style.transform  = 'translateY(0)';
    setTimeout(typeRole, 200);
  }

  function dismiss() {
    skipBtn.remove();
    cursor.style.opacity = '0';
    prompt.style.opacity = '0';

    setTimeout(() => {
      const fromRect = typed.getBoundingClientRect();
      const toRect   = heroName.getBoundingClientRect();

      const fromCX = fromRect.left + fromRect.width  / 2;
      const fromCY = fromRect.top  + fromRect.height / 2;
      const toCX   = toRect.left   + toRect.width    / 2;
      const toCY   = toRect.top    + toRect.height   / 2;

      const dx    = toCX - fromCX;
      const dy    = toCY - fromCY;
      const scale = toRect.height / fromRect.height;

      introBg.style.opacity = '0';

      typed.style.transition      = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
      typed.style.transformOrigin = '50% 50%';
      typed.style.transform       = `translate(${dx}px, ${dy}px) scale(${scale})`;

      setTimeout(() => {
        heroName.style.opacity = '1';
        requestAnimationFrame(() => {
          introBg.remove();
          intro.remove();
          setTimeout(revealRole, 80);
        });
      }, 620);
    }, 180);
  }

  function skipAll() {
    skipBtn.remove();
    introBg.remove();
    intro.remove();
    heroName.style.opacity   = '1';
    heroRole.style.opacity   = '1';
    heroRole.style.transform = 'translateY(0)';
    typeRole();
  }

  skipBtn.addEventListener('click', skipAll);

  let i = 0;
  function type() {
    if (i < phrase.length) {
      typed.textContent += phrase[i++];
      setTimeout(type, 55 + Math.random() * 55);
    } else {
      setTimeout(dismiss, 850);
    }
  }

  setTimeout(type, 400);
})();
</script>
<script src="transitions.js"></script>
</body>
</html>
